<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlyLex - FPV Store{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/main.css">

    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }
        .header-logos {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logos img {
            height: 40px; /* Настрой высоту под свои файлы */
            object-fit: contain;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-speed);
        }
        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* Выпадающее меню Каталога */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card-bg);
            min-width: 160px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            z-index: 1;
            border-radius: 4px;
            top: 100%;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a {
            padding: 12px 16px;
            display: block;
        }

        /* Тумблер темы */
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch {
            position: relative; display: inline-block; width: 40px; height: 20px;
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border-color); transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: var(--bg-color); transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #121212; }

        main { padding: 40px 5%; min-height: 70vh; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logos">
            <img src="/static/img/logos/brand-logo.png" alt="FlyLex Logo">
            <img src="/static/img/logos/led-logo.png" alt="FlyLex LEDs">
        </div>

        <nav class="nav-links">
            <div class="dropdown">
                <a href="/catalog/">Каталог ▾</a>
                <div class="dropdown-content">
                    <a href="/catalog/drones/">Дроны</a>
                    <a href="/catalog/parts/">Комплектующие</a>
                    <a href="/catalog/leds/">Светодиоды</a>
                </div>
            </div>
            <a href="/about/">О компании</a>
            <a href="https://t.me/FlyLex_Admin" target="_blank">Контакты (TG)</a>
        </nav>

        <div class="nav-links">
            <a href="/cart/">Корзина</a>
            <a href="/profile/">Личный кабинет</a>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="theme-toggle">
                    <input type="checkbox" id="theme-toggle">
                    <div class="slider"></div>
                </label>
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer style="padding: 20px 5%; text-align: center; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.9em;">
        &copy; 2026 FlyLex. Все права защищены.
    </footer>

    <script src="/static/js/theme.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
