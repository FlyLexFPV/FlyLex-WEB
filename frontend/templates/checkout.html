{% extends 'base.html' %}
{% load static %}

{% block title %}FlyLex - Оформление заказа{% endblock %}

{% block content %}
<style>
    .checkout-container { display: flex; flex-wrap: wrap; gap: 40px; }
    .cart-section { flex: 1; min-width: 300px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 15px;}
    .cart-item-info { display: flex; gap: 15px; align-items: center; }
    .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border-color); }
    .cart-item-title { font-weight: 600; margin-bottom: 5px; }
    .cart-item-price { color: var(--text-muted); font-size: 0.9rem; }
    .cart-actions { display: flex; align-items: center; gap: 15px; }

    .cart-qty-controls { display: flex; align-items: center; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); }
    .cart-qty-btn { background: none; border: none; padding: 5px 12px; cursor: pointer; color: var(--text-color); transition: background var(--transition-speed); }
    .cart-qty-btn:hover { background: var(--card-bg); }
    .cart-qty-val { padding: 0 10px; font-weight: 600; font-size: 0.95rem; }

    .btn-remove { background: none; border: none; color: #d50000; cursor: pointer; font-size: 0.9rem; padding: 5px; transition: opacity var(--transition-speed); }
    .btn-remove:hover { opacity: 0.7; }
    .cart-total { font-size: 1.5rem; font-weight: 700; text-align: right; margin-top: 20px; }
    .form-section { flex: 1; min-width: 300px; background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.95rem; }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 1rem; box-sizing: border-box; transition: border-color var(--transition-speed); }
    .form-control:focus { outline: none; border-color: var(--accent-color); }
    .radio-group { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 5px; }
    .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.95rem; }
    .radio-label input[type="radio"] { accent-color: var(--accent-color); transform: scale(1.2); }
    .empty-cart-msg { color: var(--text-muted); font-size: 1.1rem; padding: 20px 0; }
</style>

<h1 class="section-title">Оформление заказа</h1>

<div class="checkout-container">
    <div class="cart-section">
        <h2 style="font-size: 1.3rem; margin-top: 0;">Ваш заказ</h2>
        <div id="cart-items"></div>
        <div class="cart-total">Итого: <span id="total-price">0</span> ₽</div>
    </div>

    <div class="form-section">
        <h2 style="font-size: 1.3rem; margin-top: 0;">Данные получателя</h2>
        <form id="checkoutForm" onsubmit="handleCheckout(event)">
            <div class="form-group">
                <label>ФИО</label>
                <input type="text" id="fullName" class="form-control" required placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="phone" class="form-control" required placeholder="+7 (999) 000-00-00">
            </div>
            <div class="form-group">
                <label>Telegram (ник)</label>
                <input type="text" id="tgUsername" class="form-control" required placeholder="@username">
            </div>

            <h3 style="font-size: 1.1rem; margin-top: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">Доставка</h3>
            <div class="form-group">
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="delivery" value="Ozon" checked> Ozon</label>
                    <label class="radio-label"><input type="radio" name="delivery" value="Яндекс"> Яндекс Доставка</label>
                    <label class="radio-label"><input type="radio" name="delivery" value="СДЭК"> СДЭК</label>
                </div>
            </div>
            <div class="form-group">
                <label>Точный адрес ПВЗ</label>
                <textarea id="address" class="form-control" rows="3" required placeholder="Город, Улица, Дом"></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 15px; font-weight: 600;">
                Перейти в Telegram для оплаты
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/cart.js' %}"></script>
{% endblock %}
